<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="CSS/style.css">
</head>



<body>

        <section id="header-logo">
            <img src="img/Logo.png" alt="logo-boolean">

        </nav>
    </div>

    <!-- inizio contenuto - main -->

            <section>

    <!-- fine contenuto - main -->
